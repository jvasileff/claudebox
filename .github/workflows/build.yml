name: Build and push image

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claudebox

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull previous image for cache
        run: docker pull $IMAGE:latest-${{ matrix.platform }} || true

      - name: Build and push
        run: |
          docker build \
            --cache-from $IMAGE:latest-${{ matrix.platform }} \
            --build-arg CACHE_BUSTER=$(date +%Y-%m) \
            --build-arg AI_CACHE_BUSTER=$(date +%Y-%m-%d) \
            -f Dockerfile \
            -t $IMAGE:latest-${{ matrix.platform }} \
            context
          docker push $IMAGE:latest-${{ matrix.platform }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t $IMAGE:latest \
            $IMAGE:latest-amd64 \
            $IMAGE:latest-arm64
