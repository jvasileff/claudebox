name: Build and push image

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily (02:00 EST / 03:00 EDT)

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claudebox

jobs:
  # Resolve tool versions once so both arch builds use identical pins
  # (and so unchanged tools produce identical cache keys night to night).
  versions:
    runs-on: ubuntu-latest
    outputs:
      cache_buster: ${{ steps.resolve.outputs.cache_buster }}
      ai_cache_buster: ${{ steps.resolve.outputs.ai_cache_buster }}
      claude_version: ${{ steps.resolve.outputs.claude_version }}
      codex_version: ${{ steps.resolve.outputs.codex_version }}
      pi_versions: ${{ steps.resolve.outputs.pi_versions }}
    steps:
      - name: Resolve tool versions
        id: resolve
        run: |
          set -euo pipefail

          claude_version=$(curl -fsSL https://downloads.claude.ai/claude-code-releases/stable)
          echo "$claude_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "unexpected claude version: $claude_version" >&2; exit 1; }

          codex_version=$(npm view @openai/codex version)

          pi_versions=""
          for p in pi-ai pi-agent-core pi-coding-agent pi-mom pi-tui; do
            pi_versions="$pi_versions$p@$(npm view "@mariozechner/$p" version) "
          done

          {
            echo "cache_buster=$(date +%Y-%m)"
            echo "ai_cache_buster=$(date +%Y-%m-%d)"
            echo "claude_version=$claude_version"
            echo "codex_version=$codex_version"
            echo "pi_versions=${pi_versions% }"
          } >> "$GITHUB_OUTPUT"

      - name: Show resolved versions
        run: |
          echo "claude: ${{ steps.resolve.outputs.claude_version }}"
          echo "codex:  ${{ steps.resolve.outputs.codex_version }}"
          echo "pi:     ${{ steps.resolve.outputs.pi_versions }}"

  build:
    needs: versions
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # base: all software, no sandbox setup
      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: ./context
          file: ./Dockerfile
          target: base
          push: true
          tags: ${{ env.IMAGE }}:base-${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache-${{ matrix.platform }}
          build-args: |
            CACHE_BUSTER=${{ needs.versions.outputs.cache_buster }}
            AI_CACHE_BUSTER=${{ needs.versions.outputs.ai_cache_buster }}
            CLAUDE_VERSION=${{ needs.versions.outputs.claude_version }}
            CODEX_VERSION=${{ needs.versions.outputs.codex_version }}
            PI_VERSIONS=${{ needs.versions.outputs.pi_versions }}

      # sandbox: base + firewall, hardening, entrypoint
      # cache-to only here: mode=max also exports the earlier stages.
      - name: Build and push sandbox image
        uses: docker/build-push-action@v7
        with:
          context: ./context
          file: ./Dockerfile
          target: sandbox
          push: true
          tags: ${{ env.IMAGE }}:latest-${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache-${{ matrix.platform }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache-${{ matrix.platform }},mode=max
          build-args: |
            CACHE_BUSTER=${{ needs.versions.outputs.cache_buster }}
            AI_CACHE_BUSTER=${{ needs.versions.outputs.ai_cache_buster }}
            CLAUDE_VERSION=${{ needs.versions.outputs.claude_version }}
            CODEX_VERSION=${{ needs.versions.outputs.codex_version }}
            PI_VERSIONS=${{ needs.versions.outputs.pi_versions }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      actions: write  # needed by keepalive
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          docker buildx imagetools create \
            -t $IMAGE:base \
            $IMAGE:base-amd64 \
            $IMAGE:base-arm64
          docker buildx imagetools create \
            -t $IMAGE:latest \
            $IMAGE:latest-amd64 \
            $IMAGE:latest-arm64

      # prevent GitHub disabling scheduled workflow after 60 days of repo inactivity
      - name: Keepalive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/enable"
