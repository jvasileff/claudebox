name: Build and push image

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claudebox

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build args
        id: args
        run: |
          echo "cache_buster=$(date +%Y-%m)" >> $GITHUB_OUTPUT
          echo "ai_cache_buster=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./context
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest-${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache-${{ matrix.platform }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache-${{ matrix.platform }},mode=max
          build-args: |
            CACHE_BUSTER=${{ steps.args.outputs.cache_buster }}
            AI_CACHE_BUSTER=${{ steps.args.outputs.ai_cache_buster }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t $IMAGE:latest \
            $IMAGE:latest-amd64 \
            $IMAGE:latest-arm64
